version: "3.8"

services:
  minio:
    image: minio/minio
    container_name: arxiv-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arxiv-network

  qdrant:
    image: qdrant/qdrant
    container_name: arxiv-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - arxiv-network

volumes:
  minio_data:
  qdrant_data:

networks:
  arxiv-network:
    driver: bridge
